<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CCTimer</title>
  <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
  <div id="full">
    <div id="main">
      <div id="currentMode">모드를 선택해주세요</div>
      <div id="text">지금은 근무시간 입니다.</div>

      <aside id="ccplayPanel" class="ccplay-panel">
        <div class="ccplay-panel-header">
          <h2>CCPlay 요청</h2>
          <div id="ccplayConnectionStatus" class="ccplay-connection-status">서버 연결 대기 중</div>
        </div>

        <div class="ccplay-panel-section">
          <div class="ccplay-panel-label">현재 재생</div>
          <div id="ccplayCurrentRequest" class="ccplay-current-request">현재 재생 중인 요청이 없습니다.</div>
          <button id="ccplaySkipButton" type="button" class="ccplay-action-button">현재 요청 스킵</button>
        </div>

        <div class="ccplay-panel-section">
          <div class="ccplay-panel-label">호출 테스트</div>
          <div id="ccplayWakePhrase" class="ccplay-wake-phrase">현재 호출어: 헤이 클로바</div>
          <button id="ccplayWakeTestButton" type="button" class="ccplay-action-button secondary">
            클로바 호출 테스트
          </button>
        </div>

        <div class="ccplay-panel-section">
          <div class="ccplay-panel-label">대기열</div>
          <ul id="ccplayQueueList" class="ccplay-queue-list">
            <li class="ccplay-empty">대기 중인 요청이 없습니다.</li>
          </ul>
        </div>

        <div class="ccplay-panel-footer">
          <button id="ccplayClearQueueButton" type="button" class="ccplay-action-button secondary">
            대기열 전체 비우기
          </button>
          <div id="ccplayError" class="ccplay-error" style="display: none;"></div>
        </div>
      </aside>
    </div>

    <div id="bottom_frame">
      <input type="button" value="기본모드" onclick="checkstate('standard');">
      <input type="button" value="단축모드" onclick="checkstate('short');">
      <input type="button" value="디버그모드" onclick="toggleDebugMode();">

      <div id="title">Creativecrew_Timer v5.0 by Paranbear X Ramiteacher</div>
      <div id="dpTime">시간표시</div>
    </div>

    <div id="debugPanel" class="debug-panel" style="display: none;">
      <h3>디버그 모드</h3>
      <div>
        <label>시간 설정:</label><br>
        <input type="number" id="debugHour" min="0" max="23" value="10" class="debug-time-input"> :
        <input type="number" id="debugMinute" min="0" max="59" value="0" class="debug-time-input"> :
        <input type="number" id="debugSecond" min="0" max="59" value="0" class="debug-time-input">
      </div>
      <br>
      <div class="debug-button-row">
        <button type="button" onclick="setDebugTime();">시간 설정</button>
        <button type="button" onclick="resetToRealTime();">실시간 복원</button>
      </div>
      <br>
      <div class="debug-button-row">
        <button type="button" onclick="testSchedule('work');">근무시간 테스트</button>
        <button type="button" onclick="testSchedule('rest');">쉬는시간 테스트</button>
        <button type="button" onclick="testSchedule('lunch');">점심시간 테스트</button>
        <button type="button" onclick="testSchedule('finish');">퇴근시간 테스트</button>
      </div>
      <br>
      <div class="debug-button-row">
        <button type="button" onclick="stopCurrentAudio();" class="debug-stop-button">오디오 중지</button>
      </div>
      <br>
      <div>
        <label>다음 스케줄:</label><br>
        <div id="nextSchedule" class="debug-next-schedule"></div>
      </div>
    </div>
  </div>

  <script src="ws-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
